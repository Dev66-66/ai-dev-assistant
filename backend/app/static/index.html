<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dev Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 { font-size: 2rem; color: #a78bfa; }
    header p  { color: #94a3b8; margin-top: .4rem; }

    .tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .tab {
      padding: .5rem 1.25rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      cursor: pointer;
      font-size: .9rem;
      transition: all .2s;
    }

    .tab.active, .tab:hover {
      background: #7c3aed;
      color: #fff;
      border-color: #7c3aed;
    }

    .panel { display: none; max-width: 860px; margin: 0 auto; }
    .panel.active { display: block; }

    label { display: block; margin-bottom: .4rem; font-size: .85rem; color: #94a3b8; }

    textarea, select {
      width: 100%;
      padding: .75rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: .875rem;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }

    textarea:focus, select:focus { border-color: #7c3aed; }

    .row { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-end; }
    .row > * { flex: 1; }
    .row .field { display: flex; flex-direction: column; }

    button {
      padding: .65rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: .9rem;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }

    button:hover   { background: #6d28d9; }
    button:disabled { background: #4c1d95; opacity: .6; cursor: not-allowed; }

    .result-box {
      margin-top: 1.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      min-height: 120px;
    }

    .result-box pre {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: .85rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #a3e635;
    }

    .status {
      font-size: .8rem;
      margin-top: .5rem;
      color: #64748b;
    }

    .status.error { color: #f87171; }
    .status.ok    { color: #4ade80; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #7c3aed;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>⚡ AI Dev Assistant</h1>
    <p>Подсказки по коду · Генерация тестов · Генерация документации</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('completion')">Подсказки</button>
    <button class="tab"        onclick="switchTab('tests')">Тесты</button>
    <button class="tab"        onclick="switchTab('docs')">Документация</button>
  </div>

  <!-- COMPLETION -->
  <div id="panel-completion" class="panel active">
    <div class="row">
      <div class="field">
        <label>Язык</label>
        <select id="c-lang">
          <option value="python">Python</option>
          <option value="go">Go</option>
          <option value="typescript">TypeScript</option>
        </select>
      </div>
      <div class="field" style="flex:4">
        <label>Незаконченный код</label>
        <textarea id="c-code" rows="8" placeholder="def add(x, y):"></textarea>
      </div>
    </div>
    <button id="c-btn" onclick="runCompletion()">Продолжить код</button>
    <div class="result-box"><pre id="c-result">// результат появится здесь</pre></div>
    <div class="status" id="c-status"></div>
  </div>

  <!-- TESTS -->
  <div id="panel-tests" class="panel">
    <div class="row">
      <div class="field">
        <label>Язык</label>
        <select id="t-lang">
          <option value="python">Python</option>
          <option value="go">Go</option>
          <option value="typescript">TypeScript</option>
        </select>
      </div>
      <div class="field">
        <label>Фреймворк</label>
        <select id="t-framework">
          <option value="pytest">pytest</option>
          <option value="unittest">unittest</option>
        </select>
      </div>
    </div>
    <label>Код для тестирования</label>
    <textarea id="t-code" rows="10" placeholder="def multiply(a, b):&#10;    return a * b"></textarea>
    <br/>
    <button id="t-btn" onclick="runTests()">Сгенерировать тесты</button>
    <div class="result-box"><pre id="t-result">// тесты появятся здесь</pre></div>
    <div class="status" id="t-status"></div>
  </div>

  <!-- DOCS -->
  <div id="panel-docs" class="panel">
    <div class="row">
      <div class="field">
        <label>Язык</label>
        <select id="d-lang">
          <option value="python">Python</option>
          <option value="go">Go</option>
        </select>
      </div>
      <div class="field">
        <label>Стиль docstring</label>
        <select id="d-style">
          <option value="google">Google</option>
          <option value="numpy">NumPy</option>
          <option value="sphinx">Sphinx (reST)</option>
        </select>
      </div>
    </div>
    <label>Функция или класс</label>
    <textarea id="d-code" rows="10" placeholder="def calculate_discount(price, percent):&#10;    return price * (1 - percent / 100)"></textarea>
    <br/>
    <button id="d-btn" onclick="runDocs()">Сгенерировать docstring</button>
    <div class="result-box"><pre id="d-result">// docstring появится здесь</pre></div>
    <div class="status" id="d-status"></div>
  </div>

  <script>
    function switchTab(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      event.target.classList.add('active');
    }

    function setLoading(btnId, statusId, loading) {
      const btn = document.getElementById(btnId);
      const st  = document.getElementById(statusId);
      if (loading) {
        btn.disabled = true;
        st.innerHTML = '<span class="spinner"></span>Запрос к Gemini...';
        st.className = 'status';
      } else {
        btn.disabled = false;
      }
    }

    async function post(path, body) {
      const resp = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function runCompletion() {
      const code = document.getElementById('c-code').value.trim();
      if (!code) return;
      setLoading('c-btn', 'c-status', true);
      try {
        const data = await post('/completion/', {
          code, language: document.getElementById('c-lang').value
        });
        document.getElementById('c-result').textContent = data.suggestion;
        document.getElementById('c-status').textContent = '✓ Готово';
        document.getElementById('c-status').className = 'status ok';
      } catch(e) {
        document.getElementById('c-status').textContent = '✗ Ошибка: ' + e.message;
        document.getElementById('c-status').className = 'status error';
      } finally { setLoading('c-btn', 'c-status', false); }
    }

    async function runTests() {
      const code = document.getElementById('t-code').value.trim();
      if (!code) return;
      setLoading('t-btn', 't-status', true);
      try {
        const data = await post('/tests/', {
          code,
          language:  document.getElementById('t-lang').value,
          framework: document.getElementById('t-framework').value,
        });
        document.getElementById('t-result').textContent = data.tests;
        document.getElementById('t-status').textContent = '✓ Готово';
        document.getElementById('t-status').className = 'status ok';
      } catch(e) {
        document.getElementById('t-status').textContent = '✗ Ошибка: ' + e.message;
        document.getElementById('t-status').className = 'status error';
      } finally { setLoading('t-btn', 't-status', false); }
    }

    async function runDocs() {
      const code = document.getElementById('d-code').value.trim();
      if (!code) return;
      setLoading('d-btn', 'd-status', true);
      try {
        const data = await post('/docs/', {
          code,
          language: document.getElementById('d-lang').value,
          style:    document.getElementById('d-style').value,
        });
        document.getElementById('d-result').textContent = '"""\n' + data.docstring + '\n"""';
        document.getElementById('d-status').textContent = '✓ Готово';
        document.getElementById('d-status').className = 'status ok';
      } catch(e) {
        document.getElementById('d-status').textContent = '✗ Ошибка: ' + e.message;
        document.getElementById('d-status').className = 'status error';
      } finally { setLoading('d-btn', 'd-status', false); }
    }
  </script>
</body>
</html>
